apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ${APP_NAME}-ingress

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${APP_NAME}-svc
                port:
                  number: 80
