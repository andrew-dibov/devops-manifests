apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ${APP_NAME}-ingress
  namespace: default

spec:
  ingressClassName: nginx
  rules:
    - host: catchmemobbin.strangled.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${APP_NAME}-svc
                port:
                  number: 80

